# ── cloudbuild.yaml — Puente Lógico SAS BIC ───────────────────────────────
# Pipeline CI/CD: build → push → deploy en Cloud Run
# Se activa con cada push a la rama 'main' en GitHub
# También puede ejecutarse manualmente con: gcloud builds submit

steps:
  # ── PASO 1: Construir la imagen Docker ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/puente-logico-sas-bic/puente-logico-repo/puente-logico-app:latest'
      - '-f'
      - 'dockerfile'
      - '.'

  # ── PASO 2: Subir imagen a Artifact Registry ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/puente-logico-sas-bic/puente-logico-repo/puente-logico-app:latest'
    waitFor: ['build-image']

  # ── PASO 3: Desplegar en Cloud Run ──────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'puente-logico-app'
      - '--image=us-central1-docker.pkg.dev/puente-logico-sas-bic/puente-logico-repo/puente-logico-app:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--port=8080'
      - '--set-env-vars=PYTHONUNBUFFERED=1'
    waitFor: ['push-image']

images:
  - 'us-central1-docker.pkg.dev/puente-logico-sas-bic/puente-logico-repo/puente-logico-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'
